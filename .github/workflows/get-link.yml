name: Get Stream Link

on:
  push:
  workflow_dispatch:

# ★★★ BUNU EKLE ★★★
permissions:
  contents: write

jobs:
  get-link:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm install crypto-js
      
      - name: Get and Save Link as JSON
        run: |
          node -e "
          const patronDizipal = require('./patronDizipal.js');
          const fs = require('fs');
          
          (async () => {
              const tmdbId = '550';
              const type = 'movie';
              const season = 1;
              const episode = 1;
              
              let streams;
              let link = null;
              let quality = null;
              let error = null;
              
              try {
                  if (type === 'movie') {
                      streams = await patronDizipal.getStreams(tmdbId, type);
                  } else {
                      streams = await patronDizipal.getStreams(tmdbId, type, season, episode);
                  }
                  
                  if (streams && streams.length > 0) {
                      link = streams[0].url;
                      quality = streams[0].quality || 'Auto';
                  } else {
                      error = 'LINK_BULUNAMADI';
                  }
              } catch (e) {
                  error = e.message;
              }
              
              const result = {
                  success: link !== null,
                  tmdbId: tmdbId,
                  type: type,
                  season: season,
                  episode: episode,
                  link: link,
                  quality: quality,
                  timestamp: new Date().toISOString(),
                  error: error
              };
              
              fs.writeFileSync('link.json', JSON.stringify(result, null, 2));
              console.log('✅ link.json oluşturuldu');
              console.log('📺 Link:', link);
          })();
          "
      
      - name: Commit JSON File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add link.json
          git commit -m "Link güncellendi [skip ci]" || echo "Değişiklik yok"
          git push
      
      - name: Show Link
        run: cat link.json
