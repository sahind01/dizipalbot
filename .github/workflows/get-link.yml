name: Get M3U8/MP4 Link

on:
  push:
  workflow_dispatch:

jobs:
  get-link:
    runs-on: ubuntu-latest
    
    # NODE.JS UYARI ÇÖZÜMÜ - Node.js 24 kullanmaya zorla
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install crypto-js
        run: npm install crypto-js
      
      - name: Get Stream Link
        run: |
          node -e "
          const patronDizipal = require('./patronDizipal.js');
          
          (async () => {
              // ★★★ BU DEĞERLERİ DEĞİŞTİR ★★★
              const tmdbId = '550';      // Film ID (Fight Club)
              const type = 'movie';       // 'movie' veya 'tv'
              const season = 1;           // Dizi ise sezon
              const episode = 1;          // Dizi ise bölüm
              // ★★★ DEĞİŞTİRME BURADA BİTTİ ★★★
              
              let streams;
              if (type === 'movie') {
                  streams = await patronDizipal.getStreams(tmdbId, type);
              } else {
                  streams = await patronDizipal.getStreams(tmdbId, type, season, episode);
              }
              
              if (streams && streams.length > 0) {
                  console.log('✅ LINK BULUNDU:');
                  console.log('📺 URL:', streams[0].url);
                  console.log('📊 Kalite:', streams[0].quality);
                  
                  // Link türünü göster
                  if (streams[0].url.includes('.m3u8')) {
                      console.log('📁 Bu bir M3U8 playlist linki');
                  } else if (streams[0].url.includes('.mp4')) {
                      console.log('🎬 Bu bir MP4 video linki');
                  } else if (streams[0].url.includes('iframe') || streams[0].url.includes('player')) {
                      console.log('🖥️ Bu bir iframe linki, tarayıcıda açman lazım');
                  }
              } else {
                  console.log('❌ LINK BULUNAMADI');
                  console.log('TMDB ID\'yi veya film/dizi adını kontrol et');
              }
          })();
          "
