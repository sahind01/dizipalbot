const patronDizipal = require('./patronDizipal.js');

(async () => {
    const filmUrl = 'https://dizipal1556.com/movies/squatch';
    
    console.log('📌 Film URL:', filmUrl);
    
    // Sayfayı çek
    const html = await fetch(filmUrl).then(r => r.text());
    
    // Player linkini bul (farklı pattern'ler)
    const patterns = [
        /window\.location\.href\s*=\s*["']([^"']+)["']/i,
        /data-href=["']([^"']+)["']/i,
        /href=["'](\/player\/[^"']+)["']/i,
        /src=["'](\/player\/[^"']+)["']/i,
        /data-player=["']([^"']+)["']/i,
        /player\/([a-zA-Z0-9]+)/i
    ];
    
    let playerUrl = null;
    for (const pattern of patterns) {
        const match = html.match(pattern);
        if (match) {
            playerUrl = match[1];
            console.log(`✅ Player URL bulundu: ${playerUrl}`);
            break;
        }
    }
    
    if (!playerUrl) {
        console.log('❌ Player URL bulunamadı, tüm sayfayı kaydediyorum...');
        require('fs').writeFileSync('sayfa.html', html);
        console.log('📄 sayfa.html kaydedildi, manuel incele');
        return;
    }
    
    // Player URL'yi dene
    const fullPlayerUrl = playerUrl.startsWith('http') ? playerUrl : `https://dizipal1556.com${playerUrl}`;
    console.log(`🎮 Player URL: ${fullPlayerUrl}`);
    
    try {
        const streams = await patronDizipal.getStreams(
            'squatch',
            'movie',
            null,
            null,
            fullPlayerUrl
        );
        
        if (streams && streams.length > 0) {
            console.log('✅ LINK BULUNDU!');
            console.log('📺 URL:', streams[0].url);
        } else {
            console.log('❌ Link bulunamadı');
        }
    } catch (e) {
        console.error('❌ Hata:', e.message);
    }
})();
