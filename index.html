<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dizi & Film Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Player animasyonları ve şıklık için ufak dokunuşlar */
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8 font-sans">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
            Dizi & Film X
        </h1>
        <p class="text-gray-400 mt-2">Örnek İçerik Kataloğu</p>
    </header>

    <main id="content-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="relative group bg-gray-800 rounded-xl overflow-hidden shadow-lg cursor-pointer transition transform hover:-translate-y-2 hover:shadow-2xl" onclick="openPlayer('https://dizipal1547.com/ornek-dizi-linki')">
            <img src="https://via.placeholder.com/300x450" alt="Afiş" class="w-full h-auto object-cover opacity-80 group-hover:opacity-100 transition">
            <div class="absolute bottom-0 w-full bg-gradient-to-t from-black to-transparent p-4">
                <h3 class="text-lg font-bold">Örnek Dizi</h3>
                <span class="text-xs bg-purple-600 px-2 py-1 rounded-full">Dizi</span>
            </div>
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                <div class="bg-black bg-opacity-60 rounded-full p-4">▶</div>
            </div>
        </div>
    </main>

    <div id="player-modal" class="fixed inset-0 z-50 bg-black bg-opacity-90 hidden flex items-center justify-center p-4">
        <div class="relative w-full max-w-5xl bg-black rounded-lg overflow-hidden shadow-2xl border border-gray-700 modal-enter">
            <button onclick="closePlayer()" class="absolute top-4 right-4 z-50 text-white bg-red-600 hover:bg-red-700 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">
                ×
            </button>
            
            <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-40">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-purple-500 mb-4"></div>
                <p class="text-gray-300 animate-pulse">Şifreler çözülüyor, kaynak aranıyor...</p>
            </div>

            <div class="aspect-video w-full">
                <iframe id="video-frame" class="w-full h-full border-none hidden" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
    </div>

    <script>
        // API'ye istek atıp player'ı açan fonksiyon
        async function openPlayer(targetUrl) {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-frame');
            const spinner = document.getElementById('loading-spinner');
            
            modal.classList.remove('hidden');
            iframe.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                // Vercel'deki API'mize istek atıyoruz
                const response = await fetch(`/api/decrypt?url=${encodeURIComponent(targetUrl)}`);
                const data = await response.json();

                if (data.success && data.iframeUrl) {
                    iframe.src = data.iframeUrl;
                    spinner.classList.add('hidden');
                    iframe.classList.remove('hidden');
                } else {
                    alert('Video kaynağı bulunamadı veya şifre çözülemedi.');
                    closePlayer();
                }
            } catch (error) {
                console.error("Hata:", error);
                alert('Bir hata oluştu.');
                closePlayer();
            }
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-frame');
            modal.classList.add('hidden');
            iframe.src = ''; // Videoyu durdurmak için
        }
    </script>
</body>
</html>
